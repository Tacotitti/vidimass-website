<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Translation Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 280px;
            height: 100vh;
            background: #2a2a2a;
            padding: 20px;
            transform: translateX(100%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .mobile-menu.active {
            display: block;
            transform: translateX(0);
        }
        .mobile-menu a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            margin: 5px 0;
        }
        .test-controls {
            margin: 20px 0;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .lang-btn {
            margin: 5px;
        }
        #log {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Mobile Translation System Test</h1>
    
    <div class="test-controls">
        <h2>Language Controls</h2>
        <button class="lang-btn" data-lang="de">🇩🇪 Deutsch</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="tr">🇹🇷 Türkçe</button>
        <button class="lang-btn" data-lang="pt">🇵🇹 Português</button>
        <button class="lang-btn" data-lang="es">🇪🇸 Español</button>
        
        <hr style="margin: 20px 0;">
        
        <button onclick="toggleMobileMenu()">Toggle Mobile Menu</button>
        <button onclick="createMobileMenuDynamically()">Create Mobile Menu (Dynamic)</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <div class="test-controls">
        <h2>Translatable Elements (Static)</h2>
        <p>Home</p>
        <p>Features</p>
        <p>Pricing</p>
        <p>Contact</p>
    </div>

    <!-- Mobile Menu (will be created dynamically) -->
    <div class="mobile-menu" id="mobileMenu">
        <!-- Will be populated by JavaScript -->
    </div>

    <div id="log"></div>
    
    <script>
        // Hijack console.log to show in page
        const originalLog = console.log;
        const originalError = console.error;
        const logElement = document.getElementById('log');
        
        function addToLog(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const color = isError ? '#ff6b6b' : '#51cf66';
            logElement.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToLog(args.join(' '), false);
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToLog('ERROR: ' + args.join(' '), true);
        };
        
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('active');
            console.log('Mobile menu toggled:', menu.classList.contains('active'));
        }
        
        function createMobileMenuDynamically() {
            const menu = document.getElementById('mobileMenu');
            menu.innerHTML = `
                <h3>Mobile Menu (Dynamic)</h3>
                <a href="#">Home</a>
                <a href="#">Features</a>
                <a href="#">Social Media Charting</a>
                <a href="#">Pricing</a>
                <a href="#">Contact</a>
                <a href="#">Get Started</a>
            `;
            console.log('✅ Mobile menu created dynamically with data-i18n attributes');
            menu.classList.add('active');
        }
        
        function clearLog() {
            logElement.innerHTML = '';
        }
        
        // Initial log
        console.log('🚀 Test page loaded');
        console.log('Translation system version:', window.LanguageSystemV3?.version);
    </script>
</body>
</html>
